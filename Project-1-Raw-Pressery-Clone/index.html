<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Pressery Clone</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <div class="announcement-bar">
            Free Shipping Above ₹499
        </div>

        <nav class="navbar">
            <div class="logo">
                RAW
            </div>

            <ul class="nav-links">
                <li>Shop</li>
                <li>Juices</li>
                <li>About</li>
            </ul>

            <div class="nav-icons">
                Search Cart
            </div>
        </nav>
    </header>
    <main>

        <section class="hero">
            <div class="hero-content">
                <h1>Juices</h1>
                <p>
                    Fresh cold-pressed juices crafted from real fruits and vegetables.
                </p>
                <a href="#" class="hero-btn">
                    Shop Now
                </a>
            </div>
        </section>

        <section class="products">

            <h2>Our Juices</h2>

            <div class="product-grid">

                <div class="card">
                    <img src="images/Juice1.png" alt="Juice">
                    <h3>Mixed Fruit Juice</h3>

                    <p>₹120</p>
                </div>

                <div class="card">
                    <img src="images/Juice2.png" alt="Juice">

                    <h3>Mango Juice</h3>

                    <p>₹140</p>
                </div>

                <div class="card">
                    <img src="images/Juice3.png" alt="Juice">
                    <h3>Masala Lemon Juice</h3>

                    <p>₹130</p>
                </div>

            </div>

        </section>

    </main>
</body>
</html>
